# Archexa example config — FastAPI full architecture documentation
# Clone FastAPI first: git clone https://github.com/fastapi/fastapi.git
# Then run: archexa analyze --config examples/fastapi/config-analyze.yaml

archexa:
  source: "./fastapi"

  openai:
    model: "anthropic/claude-sonnet-4"
    endpoint: "https://openrouter.ai/api/v1/"
    tls_verify: true

  output: "examples/fastapi"
  log_level: "INFO"

  limits:
    max_files: 2000
    prompt_budget: 198000
    prompt_reserve: 10000
    retries: 5

  evidence:
    file_size_limit: 300000
    blocks_per_file: 12
    block_height: 120
    lookahead: 90
    lookbehind: 10
    max_slices: 20

  deep:
    enabled: false

  prompts:
    user: |
      Generate a comprehensive architecture document with:
      - System overview and purpose
      - Architecture diagram (mermaid)
      - All major components with responsibilities (table format)
      - Request lifecycle from incoming HTTP to response
      - Dependency injection system design
      - Middleware and plugin architecture
      - Error handling patterns
      - Testing architecture
      - Key design decisions and trade-offs

      Rules:
      - Use tables for all structured data
      - Include mermaid diagrams for architecture and flows
      - No evidence blocks or raw code blocks in output
      - Professional tone suitable for onboarding documentation
      - Exclude Evidence Blocks In response

  show_evidence: false
  embed_evidence: false
  cache: true
